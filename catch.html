
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app {
  min-height: 600px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem 1rem;
  font-family: var(--font-sans);
}
.screen { width: 100%; max-width: 720px; display: none; flex-direction: column; align-items: center; gap: 1.75rem; }
.screen.active { display: flex; }

.main-title { font-size: 2rem; font-weight: 500; color: var(--color-text-primary); text-align: center; }
.main-sub { font-size: 1rem; color: var(--color-text-secondary); text-align: center; margin-top: 0.4rem; }

.team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 100%; }
.team-card-sel {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 2rem 1.5rem; cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  text-align: center; display: flex; flex-direction: column; gap: 1rem; align-items: center;
}
.team-card-sel:hover { border-color: var(--color-border-primary); transform: scale(1.02); }
.team-card-sel:active { transform: scale(0.98); }
.team-emoji { font-size: 3rem; }
.team-name { font-size: 1.1rem; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
.team-count { font-size: 0.9rem; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: 99px; padding: 0.25rem 0.75rem; }

.team-header { text-align: center; }
.team-header-name { font-size: 1.6rem; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }

.members-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 140px));
  gap: 0.75rem;
  justify-content: center;
  width: 100%;
}

.card-wrap { perspective: 600px; height: 80px; width: 100%; cursor: pointer; }
.card-wrap.counting { cursor: not-allowed; }
.card-inner {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: var(--border-radius-md);
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  border-radius: var(--border-radius-md);
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.card-back {
  background: #534AB7; border: 0.5px solid #3C3489;
  font-size: 1.5rem; font-weight: 500; color: #EEEDFE;
}
.card-front {
  background: #EEEDFE; border: 0.5px solid #7F77DD;
  color: #3C3489; font-size: 1rem; font-weight: 500;
  transform: rotateY(180deg); text-align: center; padding: 0.25rem; line-height: 1.3;
}
.card-wrap:not(.counting):hover .card-back { background: #3C3489; }

/* fullscreen overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
}
.overlay.active { display: flex; }

.overlay-countdown {
  font-size: 9rem; font-weight: 500; color: #fff;
  opacity: 0; transform: scale(1.4);
  transition: opacity 0.15s, transform 0.25s;
}
.overlay-countdown.show { opacity: 1; transform: scale(1); }
.overlay-countdown.hide { opacity: 0; transform: scale(0.4); }

.overlay-name {
  font-size: 5rem; font-weight: 500; color: #fff;
  text-align: center;
  opacity: 0; transform: scale(0.8);
  transition: opacity 0.4s, transform 0.4s;
}
.overlay-name.show { opacity: 1; transform: scale(1); }

.overlay-close {
  margin-top: 1rem;
  padding: 1rem 3rem;
  font-size: 1.1rem; font-weight: 500;
  border-radius: var(--border-radius-md);
  border: 1.5px solid rgba(255,255,255,0.5);
  background: transparent; color: #fff;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.overlay-close.visible { display: block; }
.overlay-close:hover { background: rgba(255,255,255,0.12); }

.btn-row { display: flex; gap: 1rem; width: 100%; }
.btn {
  flex: 1; height: 80px; padding: 0 1.25rem;
  border-radius: var(--border-radius-md);
  font-size: 18px; font-weight: 500; cursor: pointer;
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary); color: var(--color-text-primary);
  transition: background 0.15s, transform 0.1s, opacity 0.2s; text-align: center;
}
.btn:hover:not(:disabled) { background: var(--color-background-secondary); }
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-main { flex: 0; min-width: 100px; height: auto; padding: 1rem 1.25rem; font-size: 0.95rem; }
</style>

<div id="app">
  <div class="screen active" id="main-screen">
    <h2 class="sr-only">팀 캐치 트레이드</h2>
    <div>
      <p class="main-sub">팀을 선택하세요</p>
    </div>
    <div class="team-grid">
      <div class="team-card-sel" onclick="selectTeam(0)">
        <div class="team-name">공산당</div>
        <div class="team-count">11명</div>
      </div>
      <div class="team-card-sel" onclick="selectTeam(1)">
        <div class="team-name">건들면 물어용<br>웃으면서 해용</div>
        <div class="team-count">10명</div>
      </div>
    </div>
  </div>

  <div class="screen" id="team-screen">
    <div class="team-header">
      <p class="team-header-name" id="team-header-name"></p>
    </div>
    <div class="members-grid" id="members-grid"></div>
    <div class="btn-row">
      <button class="btn" id="shuffle-btn" onclick="shuffleAll()">섞기</button>
    </div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn btn-main" onclick="goMain()">← 메인</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-countdown" id="overlay-countdown"></div>
  <div class="overlay-name" id="overlay-name"></div>
  <button class="overlay-close" id="overlay-close" onclick="closeOverlay()">확인</button>
</div>

<script>
const teams = [
  { name: "공산당", members: ["곽철성","김경태","김동한","김동현","박경훈","이봉규","이상훈","이선탁","이지혜","정상훈","현보욱"] },
  { name: "건들면 물어용\n웃으면서 해용", members: ["강대환","강창규","김선재","박성대","박정민","성주원","유덕휘","최명수","하준수","황지운"] }
];

let currentTeam = null;
let cards = [];
let flippedIdx = null;
let isCounting = false;
let countdownTimer = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildCards(members) {
  const numbers = shuffle([...Array(members.length).keys()].map(i => i + 1));
  const names = shuffle([...members]);
  return numbers.map((num, i) => ({ number: num, name: names[i] }));
}

function selectTeam(idx) {
  currentTeam = teams[idx];
  flippedIdx = null;
  cards = buildCards(currentTeam.members);
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('team-screen').classList.add('active');
  document.getElementById('team-header-name').innerHTML = currentTeam.name.replace('\n','<br>');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('members-grid');
  grid.innerHTML = cards.map((c, i) => `
    <div class="card-wrap${i === flippedIdx ? ' flipped' : ''}" id="card-${i}" onclick="pickCard(${i})">
      <div class="card-inner">
        <div class="card-face card-back">${c.number}</div>
        <div class="card-face card-front">${c.name}</div>
      </div>
    </div>
  `).join('');
}

function pickCard(idx) {
  if (isCounting) return;
  startCountdown(idx);
}

function startCountdown(idx) {
  isCounting = true;
  document.querySelectorAll('.card-wrap').forEach(c => c.classList.add('counting'));

  const overlay = document.getElementById('overlay');
  const cd = document.getElementById('overlay-countdown');
  const on = document.getElementById('overlay-name');
  const oc = document.getElementById('overlay-close');

  on.classList.remove('show');
  on.textContent = '';
  oc.classList.remove('visible');
  cd.classList.remove('show','hide');
  cd.textContent = '';
  overlay.classList.add('active');

  let count = 3;

  function showNum(n, cb) {
    cd.textContent = n;
    cd.classList.remove('hide');
    void cd.offsetWidth;
    cd.classList.add('show');
    countdownTimer = setTimeout(() => {
      cd.classList.remove('show');
      cd.classList.add('hide');
      setTimeout(cb, 200);
    }, 750);
  }

  function tick() {
    if (count === 0) {
      cd.classList.remove('show','hide');
      cd.textContent = '';
      revealResult(idx);
      return;
    }
    showNum(count, () => { count--; tick(); });
  }

  tick();
}

function revealResult(idx) {
  isCounting = false;
  flippedIdx = idx;
  document.querySelectorAll('.card-wrap').forEach(c => c.classList.remove('counting'));
  document.getElementById(`card-${idx}`).classList.add('flipped');

  const on = document.getElementById('overlay-name');
  const oc = document.getElementById('overlay-close');
  on.textContent = cards[idx].name;
  void on.offsetWidth;
  on.classList.add('show');
  setTimeout(() => oc.classList.add('visible'), 400);
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

function shuffleAll() {
  if (isCounting) return;
  flippedIdx = null;
  cards = buildCards(currentTeam.members);
  renderGrid();
}

function goMain() {
  if (countdownTimer) { clearTimeout(countdownTimer); countdownTimer = null; }
  isCounting = false;
  document.getElementById('overlay').classList.remove('active');
  document.querySelectorAll('.card-wrap').forEach(c => c.classList.remove('counting'));
  document.getElementById('team-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
}
</script>
